        // --- RENDER LOGIC ---
        
        const notebookContainer = document.getElementById('notebook-container');
        const tocContainer = document.getElementById('toc-container');
        let executionCount = 1;

        function renderNotebook() {
            notebookContainer.innerHTML = '';
            tocContainer.innerHTML = '';

            notebookCells.forEach((cell, index) => {
                const cellElement = document.createElement('div');
                cellElement.className = 'jp-Cell';
                
                if (cell.type === 'markdown') {
                    // It's a Markdown cell (just output HTML)
                    const outputArea = document.createElement('div');
                    outputArea.className = 'jp-Cell-outputArea';
                    
                    const prompt = document.createElement('div');
                    prompt.className = 'jp-OutputPrompt';
                    prompt.innerHTML = ''; // Empty for markdown
                    
                    const mdContent = document.createElement('div');
                    mdContent.className = 'jp-MarkdownOutput';
                    mdContent.innerHTML = cell.content;
                    
                    outputArea.appendChild(prompt);
                    outputArea.appendChild(mdContent);
                    cellElement.appendChild(outputArea);

                    // If it contains a heading, add to ToC
                    const temp = document.createElement('div');
                    temp.innerHTML = cell.content;
                    const heading = temp.querySelector('h1, h2, h3');
                    if (heading) {
                        cellElement.id = 'section-' + index;
                        const tocItem = document.createElement('div');
                        tocItem.className = 'toc-item';
                        tocItem.textContent = heading.innerText;
                        tocItem.onclick = () => {
                            document.querySelectorAll('.toc-item').forEach(el => el.classList.remove('active'));
                            tocItem.classList.add('active');
                            cellElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        };
                        tocContainer.appendChild(tocItem);
                    }

                } else if (cell.type === 'code_qa') {
                    // It's a Code cell (Input is Question, Output is Answer)
                    // 1. Input Area
                    const inputArea = document.createElement('div');
                    inputArea.className = 'jp-Cell-inputArea';
                    
                    const inPrompt = document.createElement('div');
                    inPrompt.className = 'jp-InputPrompt';
                    inPrompt.innerHTML = `In [${cell.qNum || executionCount}]:`;
                    
                    const codeBlock = document.createElement('div');
                    codeBlock.className = 'jp-CodeMirror';
                    // Apply simple syntax highligting (coloring string text)
                    let highlightedCode = cell.question.replace(/("[^"]*")/g, '<span style="color:#2e7d32;">$1</span>');
                    highlightedCode = highlightedCode.replace(/([a-zA-Z_]+)(?=\()/g, '<span style="color:#1565c0;">$1</span>'); // functions
                    codeBlock.innerHTML = highlightedCode;
                    
                    inputArea.appendChild(inPrompt);
                    inputArea.appendChild(codeBlock);
                    
                    // 2. Output Area
                    const outputArea = document.createElement('div');
                    outputArea.className = 'jp-Cell-outputArea';
                    
                    const outPrompt = document.createElement('div');
                    outPrompt.className = 'jp-OutputPrompt';
                    outPrompt.innerHTML = `Out[${cell.qNum || executionCount}]:`;
                    
                    const answerContent = document.createElement('div');
                    answerContent.className = 'jp-MarkdownOutput';
                    answerContent.innerHTML = cell.answer;
                    
                    outputArea.appendChild(outPrompt);
                    outputArea.appendChild(answerContent);
                    
                    cellElement.appendChild(inputArea);
                    cellElement.appendChild(outputArea);
                    
                    executionCount++;
                }

                notebookContainer.appendChild(cellElement);
            });
        }

        renderNotebook();

        // Theme Toggle
        document.getElementById('themeToggle').addEventListener('click', () => {
            const currentTheme = document.body.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.body.removeAttribute('data-theme');
            } else {
                document.body.setAttribute('data-theme', 'dark');
            }
        });

        // Search Filter
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const cells = document.querySelectorAll('.jp-Cell');
            
            cells.forEach(cell => {
                if(cell.innerText.toLowerCase().includes(term)) {
                    cell.style.display = 'flex';
                } else {
                    cell.style.display = 'none';
                }
            });
        });

    </script>
